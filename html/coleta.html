<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleta</title>
    <link rel="icon" type="image/png" href="/img/logo.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div onclick="direcionar('/html/index.html')" class="headerTitulo">
            <img src="/img/logo.png" class="logo">
            <h1>Throwing Out Eficiente</h1>
        </div>
        <nav>
            <div class="headerButton">
                <button style="width: auto;">Locais de Descarte</button>
                <button>Sobre</button>
                <button onclick="direcionar('/html/denuncia.html')">Denúncia</button>
                <button onclick="direcionar('/html/coleta.html')">Coleta</button>
            </div>
            <div class="cadastroLogin" id="userArea">
                <button onclick="direcionar('/html/login.html')">Login</button>
                <button onclick="direcionar('/html/cadastro.html')" class="cadastro">Cadastro</button>
            </div>
        </nav>
    </header>
    <section class="welcome">
        <div class="retornar">
            <button onclick="direcionar('/html/index.html')">Retornar</button>
        </div>
        <div class="container">
            <h1>Faça sua Requisição de coleta abaixo</h1>
            <form id="coletaForm">
                <input type="number" id="local" placeholder="Informe o ID do local"required>
                <select name="tipoMaterial" id="tipoMaterial">
                    <option value="2">Sofa</option>
                    <option value="3">Guarda Roupa</option>
                    <option value="4">Geladeira</option>
                    <option value="5">Comoda</option>
                    <option value="6">mesa</option>
                    <option value="7">cama</option>
                    <option value="8">bateria</option>
                    <option value="9">pilha</option>
                    <option value="10">eletronicos</option>
                    <option value="11">Vidro</option>
                </select>
                <input style="padding-bottom:10vh; width:100%" type="text" id="senha" placeholder="observação"required>
                <button type="submit" class="formButton">Registrar</button>
            </form>
        </div>
    </section>
    <footer>
        <div>
            <img src="/img/logo.png">
            <p>Throwing Out Consciente © 2026</p>
        </div>
    </footer>

</body>
<script src="/js/script.js"></script>
<script>
    document.getElementById("coletaForm").addEventListener("submit",async(co)=>{
        co.preventDefault()
        let local = document.getElementById("local").value
        let tipoMaterial = document.getElementById("tipoMaterial").value
        let res = await fetch("http://localhost:3000/coleta/inserir",{
            method:"POST",
            credentials:"include",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                local,tipoMaterial
            })
        })
        let data=await res.json()
        if(data.sucesso){
            alert("Requisicao de coleta enviada!")
            document.getElementById("coletaForm").reset()
        }
        
    })



    nescessitaLogin()
</script>
</html>
