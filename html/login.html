<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THROWING OUT CONSCIENTE</title>
    <link rel="icon" type="image/png" href="/img/logo.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div onclick="direcionar('/html/index.html')" class="headerTitulo">
            <img src="/img/logo.png" class="logo">
            <h1>Throwing Out Eficiente</h1>
        </div>
        <nav>
            <div class="headerButton">
                <button style="width: auto;">Locais de Descarte</button>
                <button>Sobre</button>
                <button>Denúncia</button>
                <button>Coleta</button>
            </div>
            <div class="cadastroLogin">
                <button>Login</button>
                <button class="cadastro">Cadastro</button>
            </div>
        </nav>
    </header>
    <section class="welcome">
        <div class="retornar">
            <button>Retornar</button>
        </div>
        <div class="container">
            <h1>Realize o Login</h1>
            <form>
                <input type="text" id="email" placeholder="Informe seu endereço de email"required>
                <input type="text" id="senha" placeholder="Informe sua senha"required>
                <button type="submit" class="formButton">Logar</button>
            </form>
        </div>
    </section>
    <footer>
        <div>
            <img src="/img/logo.png">
            <p>Throwing Out Consciente © 2026</p>
        </div>
    </footer>
</body>
