<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THROWING OUT CONSCIENTE</title>
    <link rel="icon" type="image/png" href="/img/logo.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div onclick="direcionar('/html/index.html')" class="headerTitulo">
            <img src="/img/logo.png" class="logo">
            <h1>Throwing Out Eficiente</h1>
        </div>
        <nav>
            <div class="headerButton">
                <button style="width: auto;">Locais de Descarte</button>
                <button>Sobre</button>
                <button onclick="direcionar('/html/denuncia.html')">Denúncia</button>
                <button onclick="direcionar('/html/coleta.html')">Coleta</button>
            </div>
            <div class="cadastroLogin">
                <button onclick="direcionar('/html/login.html')">Login</button>
                <button onclick="direcionar('/html/cadastro.html')" class="cadastro">Cadastro</button>
            </div>
        </nav>
    </header>
    <section class="welcome">
        <div class="retornar">
            <button onclick="direcionar('/html/index.html')">Retornar</button>
        </div>
        <div class="container">
            <h1>Realize o Cadastro</h1>
            <form class="form" id="cadastroForm">

                <input type="text" id="nome" placeholder="Informe seu nome"required>
                <input type="text" id="email" placeholder="Informe seu endereço de email"required>
                <input type="text" id="senha" placeholder="Informe sua senha"required>
                <input type="text" id="confSenha" placeholder="Confirme sua senha"required>
                <button type="submit" class="formButton">Finalizar Cadastro</button>
            </form>
        </div>
    </section>
    <footer>
        <div>
            <img src="/img/logo.png">
            <p>Throwing Out Consciente © 2026</p>
        </div>
    </footer>
</body>
<script src="/js/script.js"></script>
<script>
    
    document.getElementById("cadastroForm").addEventListener("submit",async(c)=>{
            c.preventDefault
            let nome=document.getElementById("nome").value
            let email=document.getElementById("email").value
            let senha=document.getElementById("senha").value
            let res=await fetch("http://localhost:3000/usuario/cadastro",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({nome,email,senha})
                
            })
            
    })
</script>
</html>
